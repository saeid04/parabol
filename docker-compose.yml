services:
  postgres:
    image: pgvector/pgvector:0.8.0-pg16
    restart: always
    env_file: .env
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - parabol-network
  valkey:
    image: valkey/valkey:9.0-alpine
    command: valkey-server --save ""
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - valkey-data:/data
    networks:
      - parabol-network
  app:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.prod
    env_file: .env
    ports:
      - '80:3000'
    depends_on:
      - valkey
      - postgres
    networks:
      - parabol-network
networks:
  parabol-network:
volumes:
  valkey-data: {}
  postgres-data: {}
