# Parabol on Coolify - self-hosted retro + agile suite. BUILD-FROM-SOURCE (no official image).
#
# HOW TO DEPLOY (not a plain paste like Postiz):
#   1. Fork github.com/bayukp/dokku-parabol into your own Git (recommended, to pin the version),
#      OR point Coolify straight at that repo. It's a Parabol fork with ./docker/Dockerfile.prod.
#   2. In Coolify: New Resource -> Docker Compose -> source = that Git repo.
#   3. Replace its docker-compose.yml with THIS file (Coolify magic vars, no host ports,
#      domain via Traefik). The `build:` context resolves against the cloned repo.
#   4. Set the env vars below (SERVER_SECRET + POSTGRES password are auto-generated by Coolify).
#   5. Deploy. First boot auto-runs DB migrations - watch logs for "Ready for GraphQL Execution".
#
# Server headroom checked 2026-07-04: 60GB RAM / 36GB free -> the build is comfortable.
services:
  app:
    image: 'parabol-selfhosted:latest'          # Coolify needs an image name (tags the build)
    build:
      context: .
      dockerfile: ./docker/Dockerfile.prod
    restart: always
    environment:
      # NOTE: no SERVICE_FQDN magic var on purpose - it kept regenerating to the sslip domain
      # (Coolify bug #6124 when there's no server wildcard domain). Set the domain in the
      # Coolify UI "Domains" field instead (https://parabol.smenode.com:3000) and hardcode APP_ORIGIN.
      - 'APP_ORIGIN=https://parabol.smenode.com'  # hardcoded public origin (no port, no trailing slash)
      - SERVER_ID=1
      - 'SERVER_SECRET=${SERVICE_PASSWORD_SECRET}'
      - IS_ENTERPRISE=true                        # all new orgs = enterprise tier (self-host)
      - FILE_STORE_PROVIDER=local
      - PROXY_CDN=false
      - MAIL_PROVIDER=debug                       # TODO set to smtp + creds for real signup/invite emails
      # Postgres (pgvector)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=pgparaboladmin
      - 'POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}'
      - POSTGRES_DB=parabol-saas
      - POSTGRES_USE_PGVECTOR=true
      # Valkey (Redis-compatible)
      - 'REDIS_URL=redis://valkey:6379'
      # AI features intentionally OFF (AI_* unset) - we summarize with our own Claude, not Parabol AI
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started

  postgres:
    image: 'pgvector/pgvector:0.8.0-pg16'
    restart: always
    environment:
      - POSTGRES_USER=pgparaboladmin
      - 'POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}'
      - POSTGRES_DB=parabol-saas
    volumes:
      - 'parabol-postgres-data:/var/lib/postgresql/data'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pgparaboladmin -d parabol-saas']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  valkey:
    image: 'valkey/valkey:9.0-alpine'
    restart: always
    command: 'valkey-server --save ""'
    volumes:
      - 'parabol-valkey-data:/data'

volumes:
  parabol-postgres-data: null
  parabol-valkey-data: null
