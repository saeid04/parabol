services:
  postgres:
    image: pgvector/pgvector:0.8.0-pg16
    restart: always
    env_file: .env
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - parabol-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
  valkey:
    image: valkey/valkey:9.0-alpine
    command: valkey-server --save ""
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - valkey-data:/data
    networks:
      - parabol-network
  app:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.prod
    env_file: .env
    # ports:
      # - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
    restart: unless-stopped
    networks:
      - parabol-network
networks:
  parabol-network:
volumes:
  valkey-data: {}
  postgres-data: {}
